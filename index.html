<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>YOUTUBE </title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Consolas,monospace;
}

canvas{
    position:fixed;
    inset:0;
}

#terminal{
    position:absolute;
    inset:0;
    color:#00ff00;
    padding:20px;
    white-space:pre-wrap;
    font-size:18px;
    text-shadow:0 0 8px #00ff00;
}

#progress{
    position:absolute;
    left:50%;
    bottom:60px;
    transform:translateX(-50%);
    width:70%;
    height:25px;
    border:2px solid #00ff00;
}

#bar{
    width:0%;
    height:100%;
    background:#00ff00;
    box-shadow:0 0 15px #00ff00;
}

#final{
    display:none;
    position:absolute;
    inset:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    color:#00ff00;
    text-align:center;
}

#final h1{
    color:red;
    font-size:70px;
    animation:blink .6s infinite;
}

#final h2{
    font-size:50px;
}

@keyframes blink{
50%{opacity:.2;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="terminal"></div>

<div id="progress">
<div id="bar"></div>
</div>

<div id="final">
<h2></h2>
<h1>MÁY BẠN ĐÃ BỊ HACK!</h1>
<h3>CẢNH BÁO!!!</h3>
</div>

<script>

// Matrix
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const chars="01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&";
const font=18;
const cols=Math.floor(canvas.width/font);
const drops=Array(cols).fill(1);

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=font+"px Consolas";

for(let i=0;i<drops.length;i++){
let text=chars[Math.floor(Math.random()*chars.length)];
ctx.fillText(text,i*font,drops[i]*font);

if(drops[i]*font>canvas.height&&Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}
setInterval(draw,35);

// Beep
const audio=new(window.AudioContext||window.webkitAudioContext)();

function beep(){
const osc=audio.createOscillator();
const gain=audio.createGain();

osc.connect(gain);
gain.connect(audio.destination);

osc.frequency.value=700;
osc.type="square";

osc.start();

gain.gain.exponentialRampToValueAtTime(
0.0001,
audio.currentTime+0.08
);

osc.stop(audio.currentTime+0.08);
}

// Typing
const lines=[
"Connecting...",
"Bypassing Firewall...",
"Reading System...",
"Access Granted...",
"Downloading Data...",
"Uploading Virus...",
"Encrypting Files...",
"Done."
];

let line=0;
let char=0;

const terminal=document.getElementById("terminal");

function type(){

if(line>=lines.length)return;

terminal.innerHTML+=lines[line][char];

beep();

char++;

if(char>=lines[line].length){
terminal.innerHTML+="<br>";
line++;
char=0;
}

setTimeout(type,50);

}

type();

// Progress
let p=0;

const bar=document.getElementById("bar");

const interval=setInterval(()=>{

p++;

bar.style.width=p+"%";

if(p>=100){

clearInterval(interval);

}

},100);

// Sau 10 giây
setTimeout(()=>{

document.getElementById("terminal").style.display="none";
document.getElementById("progress").style.display="none";
document.getElementById("final").style.display="flex";

},10000);

// Fullscreen nếu được phép
document.body.addEventListener("click",()=>{
if(document.documentElement.requestFullscreen){
document.documentElement.requestFullscreen();
}
},{once:true});

</script>

</body>
</html>
